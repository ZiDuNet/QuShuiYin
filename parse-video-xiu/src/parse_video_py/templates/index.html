<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, shrink-to-fit=no">
    <meta name="referrer" content="no-referrer"/>
    <title>{{ title }}</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a2e;
            --bg-hover: #252540;
            --text-primary: #e0e0e0;
            --text-secondary: #8888aa;
            --accent: #6c5ce7;
            --accent-light: #a29bfe;
            --border: #2a2a40;
            --success: #00b894;
            --error: #e17055;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 背景装饰 */
        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(108,92,231,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0,184,148,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(162,155,254,0.05) 0%, transparent 50%);
            animation: bgShift 20s ease-in-out infinite alternate;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes bgShift {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-2%, -1%) rotate(1deg); }
        }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

        .container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 32px 20px 60px;
        }

        /* 顶部导航 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .top-bar a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            transition: all 0.2s;
            background: var(--bg-secondary);
        }

        .top-bar a:hover {
            color: var(--accent-light);
            border-color: var(--accent);
        }

        /* 标题 */
        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .header h1 {
            font-size: 30px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-light), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
        }

        /* 平台选择区 */
        .platform-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .platform-group {
            margin-bottom: 16px;
        }

        .platform-group:last-child {
            margin-bottom: 0;
        }

        .platform-group-title {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 10px;
            padding-left: 2px;
        }

        .platform-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .platform-tag {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 13px;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
            user-select: none;
        }

        .platform-tag:hover {
            border-color: var(--accent);
            color: var(--accent-light);
        }

        .platform-tag.active {
            background: rgba(108,92,231,0.2);
            border-color: var(--accent);
            color: var(--accent-light);
            font-weight: 600;
        }

        .platform-tag.auto-tag {
            background: rgba(0,184,148,0.12);
            border-color: rgba(0,184,148,0.4);
            color: var(--success);
        }

        .platform-tag.auto-tag:hover {
            border-color: var(--success);
        }

        .platform-tag.auto-tag.active {
            background: rgba(0,184,148,0.25);
            border-color: var(--success);
            color: var(--success);
            font-weight: 600;
        }

        /* 输入区 */
        .input-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .input-hint {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .input-hint code {
            background: var(--bg-card);
            padding: 1px 6px;
            border-radius: 4px;
            color: var(--accent-light);
            font-size: 11px;
        }

        .input-row {
            display: flex;
            gap: 12px;
        }

        .input-row input {
            flex: 1;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-row input::placeholder { color: var(--text-secondary); }
        .input-row input:focus { border-color: var(--accent); }

        .btn {
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover { background: #5a4bd6; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(108,92,231,0.3); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .btn-sm {
            padding: 8px 16px;
            font-size: 12px;
            border-radius: 6px;
        }

        .btn-download {
            background: rgba(108,92,231,0.15);
            color: var(--accent-light);
            border: 1px solid rgba(108,92,231,0.3);
            text-decoration: none;
            display: inline-block;
        }
        .btn-download:hover { background: rgba(108,92,231,0.25); }

        .btn-cover {
            background: rgba(0,184,148,0.12);
            color: var(--success);
            border: 1px solid rgba(0,184,148,0.3);
            text-decoration: none;
            display: inline-block;
        }
        .btn-cover:hover { background: rgba(0,184,148,0.22); }

        .btn-music {
            background: rgba(225,112,85,0.12);
            color: var(--error);
            border: 1px solid rgba(225,112,85,0.3);
            text-decoration: none;
            display: inline-block;
        }
        .btn-music:hover { background: rgba(225,112,85,0.22); }

        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 60px 0;
        }

        .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* 结果卡片 */
        .result-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 视频播放器 */
        .video-wrap {
            position: relative;
            background: #000;
            width: 100%;
        }

        .video-wrap video {
            width: 100%;
            display: block;
            max-height: 420px;
            object-fit: contain;
        }

        /* 封面图 */
        .cover-wrap {
            position: relative;
            cursor: pointer;
        }

        .cover-wrap img {
            width: 100%;
            display: block;
            max-height: 360px;
            object-fit: cover;
        }

        .cover-wrap:hover::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.3);
        }

        /* 信息区 */
        .info-section {
            padding: 20px;
        }

        .info-title {
            font-size: 16px;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 12px;
            word-break: break-all;
        }

        .info-author {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .info-author img {
            width: 32px; height: 32px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--bg-card);
        }

        .info-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }

        .meta-item {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .meta-item span {
            color: var(--text-primary);
            font-weight: 500;
        }

        /* 操作按钮 */
        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            padding: 0 20px 20px;
        }

        /* 图集 */
        .gallery-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 20px 12px;
            border-top: 1px solid var(--border);
        }

        .gallery-header h3 {
            font-size: 15px;
            font-weight: 600;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 8px;
            padding: 0 20px 20px;
        }

        .gallery-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            background: var(--bg-card);
        }

        .gallery-item img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.2s;
        }

        .gallery-item:hover img { transform: scale(1.05); }

        .gallery-item .live-badge {
            position: absolute;
            top: 6px; right: 6px;
            background: rgba(108,92,231,0.9);
            color: #fff;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }

        /* 音乐播放器 */
        .music-player {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .music-player audio {
            flex: 1;
            height: 36px;
            border-radius: 8px;
        }

        .music-label {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }

        .lightbox.active { display: flex; }

        .lightbox img, .lightbox video {
            max-width: 92vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 8px;
        }

        .lightbox-close {
            position: fixed;
            top: 20px; right: 20px;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            z-index: 1001;
            background: none;
            border: none;
            width: 44px; height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            transition: background 0.2s;
        }
        .lightbox-close:hover { background: rgba(255,255,255,0.2); }

        .lightbox-nav {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            color: #fff;
            font-size: 32px;
            cursor: pointer;
            z-index: 1001;
            background: rgba(255,255,255,0.1);
            border: none;
            width: 44px; height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .lightbox-nav:hover { background: rgba(255,255,255,0.2); }
        .lightbox-prev { left: 16px; }
        .lightbox-next { right: 16px; }

        .lightbox-counter {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            z-index: 1001;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 2000;
            transition: transform 0.3s ease;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { border-color: var(--error); }
        .toast.success { border-color: var(--success); }

        /* 错误状态 */
        .error-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px 24px;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        .error-card .error-icon {
            font-size: 40px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .error-card .error-msg {
            color: var(--error);
            font-size: 14px;
            line-height: 1.6;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .container { padding: 20px 12px 40px; }
            .header h1 { font-size: 24px; }
            .input-row { flex-direction: column; }
            .input-row .btn { width: 100%; }
            .platform-tags { gap: 6px; }
            .platform-tag { padding: 5px 10px; font-size: 12px; }
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 6px; }
            .info-section { padding: 16px; }
            .actions { padding: 0 16px 16px; }
            .gallery-header { padding: 16px 16px 10px; }
            .gallery-grid { padding: 0 16px 16px; }
            .platform-section { padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部导航 -->
        <div class="top-bar">
            <span></span>
            <a href="/docs">API 文档</a>
        </div>

        <!-- 标题 -->
        <div class="header">
            <h1>去水印解析工具</h1>
            <p>统一入口 / 分平台解析，粘贴分享链接一键获取无水印视频/图集</p>
        </div>

        <!-- 平台选择 -->
        <div class="platform-section">
            <div class="platform-tags" id="platformTags">
                <span class="platform-tag auto-tag active" data-source="" onclick="selectPlatform(this)">自动识别</span>
                <span class="platform-tag" style="pointer-events:none;cursor:default;background:transparent;border:none;color:var(--text-secondary);font-size:11px;padding:0;margin:0 2px;">|</span>
                <!-- JS 动态渲染平台标签 -->
            </div>
        </div>

        <!-- 输入区 -->
        <div class="input-card">
            <div class="input-hint" id="inputHint">自动识别链接中的平台，支持抖音、快手、小红书等 50+ 平台</div>
            <div class="input-row">
                <input type="text" id="urlInput" placeholder="粘贴视频/图集分享链接（支持带文案）" autofocus>
                <button class="btn btn-primary" id="parseBtn" onclick="doParse()">解析</button>
            </div>
        </div>

        <!-- 结果区 -->
        <div id="result"></div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
        <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
        <button class="lightbox-nav lightbox-prev" onclick="lightboxNav(event,-1)">&#8249;</button>
        <div id="lightboxContent"></div>
        <button class="lightbox-nav lightbox-next" onclick="lightboxNav(event,1)">&#8250;</button>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

    <script>
    let allPlatforms = [];
    let selectedSource = '';
    let currentImages = [];
    let lightboxIndex = 0;

    // 初始化
    document.addEventListener('DOMContentLoaded', loadPlatforms);
    document.getElementById('urlInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') doParse();
    });

    // 加载平台列表
    async function loadPlatforms() {
        try {
            const resp = await fetch('/api/list');
            const json = await resp.json();
            allPlatforms = json.data || [];
            renderPlatformTags();
        } catch (e) {
            // 加载失败时仍然可用（仅自动识别模式）
        }
    }

    function renderPlatformTags() {
        const container = document.getElementById('platformTags');
        const grouped = {};
        allPlatforms.forEach(function(p) {
            const cat = p.category || '其他';
            if (!grouped[cat]) grouped[cat] = [];
            grouped[cat].push(p);
        });

        let html = '<span class="platform-tag auto-tag active" data-source="" onclick="selectPlatform(this)">自动识别</span>';

        const categoryOrder = ['视频平台', '音乐平台', '其他'];
        categoryOrder.forEach(function(cat) {
            if (!grouped[cat]) return;
            html += '<span class="platform-tag" style="pointer-events:none;cursor:default;background:transparent;border:none;color:var(--text-secondary);font-size:11px;padding:0;margin:0 2px;">|</span>';
            grouped[cat].forEach(function(p) {
                html += '<span class="platform-tag" data-source="' + escAttr(p.source) + '" onclick="selectPlatform(this)" title="' + escAttr(p.description || p.source) + '">' + escHtml(p.description || p.source) + '</span>';
            });
        });

        container.innerHTML = html;
    }

    function selectPlatform(el) {
        document.querySelectorAll('.platform-tag').forEach(function(t) {
            t.classList.remove('active');
        });
        el.classList.add('active');
        selectedSource = el.dataset.source || '';

        const hint = document.getElementById('inputHint');
        const input = document.getElementById('urlInput');
        if (selectedSource) {
            const name = el.textContent;
            hint.innerHTML = '已选择 <code>' + escHtml(name) + '</code>，将调用 <code>/api/' + escHtml(selectedSource) + '/parse</code>';
            input.placeholder = '请输入 ' + name + ' 分享链接';
        } else {
            hint.textContent = '自动识别链接中的平台，支持抖音、快手、小红书等 50+ 平台';
            input.placeholder = '粘贴视频/图集分享链接（支持带文案）';
        }
    }

    // Toast 提示
    function toast(msg, type) {
        type = type || '';
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = 'toast show ' + type;
        setTimeout(function() { el.className = 'toast'; }, 3000);
    }

    // 解析
    async function doParse() {
        const raw = document.getElementById('urlInput').value.trim();
        if (!raw) { toast('请输入分享链接', 'error'); return; }

        const m = raw.match(/https?:\/\/[\w.-]+[\w\/-]*[\w.-]*\??[\w=&:\-+%]*/);
        if (!m) { toast('未检测到有效链接', 'error'); return; }

        const btn = document.getElementById('parseBtn');
        btn.disabled = true;
        btn.textContent = '解析中...';
        document.getElementById('result').innerHTML =
            '<div class="loading"><div class="spinner"></div><p style="color:var(--text-secondary)">正在解析，请稍候...</p></div>';

        try {
            var apiUrl;
            if (selectedSource) {
                apiUrl = '/api/' + encodeURIComponent(selectedSource) + '/parse?url=' + encodeURIComponent(m[0]);
            } else {
                apiUrl = '/video/share/url/parse?url=' + encodeURIComponent(m[0]);
            }

            const resp = await fetch(apiUrl);
            const json = await resp.json();

            if (json.code === 200 && json.data) {
                renderResult(json.data);
                toast('解析成功', 'success');
            } else {
                document.getElementById('result').innerHTML =
                    '<div class="error-card"><div class="error-icon">&#10060;</div><div class="error-msg">' + escHtml(json.msg || '未知错误') + '</div></div>';
                toast('解析失败: ' + (json.msg || '未知错误'), 'error');
            }
        } catch (err) {
            document.getElementById('result').innerHTML =
                '<div class="error-card"><div class="error-icon">&#9888;&#65039;</div><div class="error-msg">网络错误: ' + escHtml(err.message) + '</div></div>';
            toast('网络错误: ' + err.message, 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = '解析';
        }
    }

    // 代理 URL
    function proxyUrl(url) {
        if (!url) return '';
        return '/proxy?url=' + encodeURIComponent(url);
    }

    // 渲染结果
    function renderResult(data) {
        var html = '<div class="result-card">';

        // 视频
        if (data.video_url) {
            html += '<div class="video-wrap">';
            html += '<video src="' + escHtml(proxyUrl(data.video_url)) + '" controls preload="metadata" playsinline></video>';
            html += '</div>';
        }
        // 封面（无视频时作为主图）
        else if (data.cover_url) {
            html += '<div class="cover-wrap" onclick="openImgLightbox(\'' + escAttr(proxyUrl(data.cover_url)) + '\')">';
            html += '<img src="' + escHtml(proxyUrl(data.cover_url)) + '" alt="封面" loading="lazy">';
            html += '</div>';
        }

        // 信息区
        html += '<div class="info-section">';
        if (data.title) {
            html += '<div class="info-title">' + escHtml(data.title) + '</div>';
        }
        if (data.author && (data.author.name || data.author.avatar)) {
            html += '<div class="info-author">';
            if (data.author.avatar) {
                html += '<img src="' + escHtml(proxyUrl(data.author.avatar)) + '" alt="" onerror="this.style.display=\'none\'">';
            }
            if (data.author.name) {
                html += '<span>' + escHtml(data.author.name) + '</span>';
            }
            if (data.author.uid) {
                html += '<span style="color:var(--text-secondary);font-size:12px">UID: ' + escHtml(data.author.uid) + '</span>';
            }
            html += '</div>';
        }
        html += '</div>';

        // 操作按钮
        html += '<div class="actions">';
        if (data.video_url) {
            html += '<a class="btn btn-sm btn-download" href="' + escHtml(proxyUrl(data.video_url)) + '" target="_blank" download>下载视频</a>';
        }
        if (data.cover_url) {
            html += '<a class="btn btn-sm btn-cover" href="' + escHtml(proxyUrl(data.cover_url)) + '" target="_blank" download>下载封面</a>';
        }
        if (data.music_url) {
            html += '<a class="btn btn-sm btn-music" href="' + escHtml(proxyUrl(data.music_url)) + '" target="_blank" download>下载音频</a>';
        }
        html += '</div>';

        // 音乐播放器
        if (data.music_url) {
            html += '<div class="music-player">';
            html += '<span class="music-label">&#127925; 背景音乐</span>';
            html += '<audio src="' + escHtml(proxyUrl(data.music_url)) + '" controls preload="none"></audio>';
            html += '</div>';
        }

        // 图集
        if (data.images && data.images.length > 0) {
            currentImages = data.images;
            html += '<div class="gallery-header">';
            html += '<h3>&#128444;&#65039; 图集 (' + data.images.length + '张)</h3>';
            html += '<button class="btn btn-sm btn-download" onclick="downloadAllZip()">打包下载</button>';
            html += '</div>';
            html += '<div class="gallery-grid">';
            data.images.forEach(function(img, i) {
                html += '<div class="gallery-item" onclick="openGalleryLightbox(' + i + ')">';
                html += '<img src="' + escHtml(proxyUrl(img.url)) + '" loading="lazy" alt="">';
                if (img.live_photo_url) {
                    html += '<span class="live-badge">Live</span>';
                }
                html += '</div>';
            });
            html += '</div>';
        }

        html += '</div>';
        document.getElementById('result').innerHTML = html;
    }

    function escHtml(s) {
        if (!s) return '';
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function escAttr(s) {
        if (!s) return '';
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    // ---- Lightbox ----

    function openVideoLightbox(e) {
        e.stopPropagation();
        var video = e.currentTarget.querySelector('video');
        if (!video) return;
        var clone = video.cloneNode(true);
        clone.controls = true;
        clone.style.maxWidth = '92vw';
        clone.style.maxHeight = '90vh';
        clone.style.borderRadius = '8px';
        document.getElementById('lightboxContent').innerHTML = '';
        document.getElementById('lightboxContent').appendChild(clone);
        document.getElementById('lightbox').classList.add('active');
    }

    function openImgLightbox(url) {
        document.getElementById('lightboxContent').innerHTML =
            '<img src="' + escHtml(url) + '" onclick="event.stopPropagation()">';
        document.getElementById('lightbox').classList.add('active');
    }

    function openGalleryLightbox(index) {
        lightboxIndex = index;
        showGalleryItem(index);
        document.getElementById('lightbox').classList.add('active');
    }

    function showGalleryItem(index) {
        var img = currentImages[index];
        if (!img) return;
        var lb = document.getElementById('lightboxContent');

        if (img.live_photo_url) {
            lb.innerHTML = '<video src="' + escHtml(proxyUrl(img.live_photo_url)) + '" controls autoplay playsinline onclick="event.stopPropagation()" style="max-width:92vw;max-height:90vh;border-radius:8px">';
        } else {
            lb.innerHTML = '<img src="' + escHtml(proxyUrl(img.url)) + '" onclick="event.stopPropagation()">';
        }

        var counter = document.createElement('div');
        counter.className = 'lightbox-counter';
        counter.textContent = (index + 1) + ' / ' + currentImages.length;
        lb.appendChild(counter);
    }

    function closeLightbox(e) {
        if (e && e.target !== e.currentTarget && !e.target.classList.contains('lightbox-close')) return;
        document.getElementById('lightbox').classList.remove('active');
        document.getElementById('lightboxContent').innerHTML = '';
    }

    function lightboxNav(e, dir) {
        e.stopPropagation();
        lightboxIndex = (lightboxIndex + dir + currentImages.length) % currentImages.length;
        showGalleryItem(lightboxIndex);
    }

    // 键盘操作
    document.addEventListener('keydown', function(e) {
        if (!document.getElementById('lightbox').classList.contains('active')) return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') lightboxNav(e, -1);
        if (e.key === 'ArrowRight') lightboxNav(e, 1);
    });

    // ---- 批量下载 ----

    async function downloadAllZip() {
        if (typeof JSZip === 'undefined') { toast('JSZip 未加载，请检查网络', 'error'); return; }
        if (typeof saveAs === 'undefined') { toast('FileSaver 未加载，请检查网络', 'error'); return; }

        toast('正在打包 ' + currentImages.length + ' 张图片...');

        var zip = new JSZip();
        var folder = zip.folder('images');
        var ok = 0, fail = 0;

        await Promise.all(currentImages.map(async function(img, i) {
            try {
                // 通过代理下载以绕过防盗链
                var resp = await fetch(proxyUrl(img.url));
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                var blob = await resp.blob();
                var ext = (img.url.match(/\.(jpg|jpeg|png|gif|webp)/i) || ['jpg'])[1] || 'jpg';
                folder.file(String(i + 1).padStart(3, '0') + '.' + ext, blob);
                ok++;
            } catch (e) { fail++; }
        }));

        if (ok === 0) { toast('所有图片下载失败', 'error'); return; }

        var blob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
        saveAs(blob, 'images_' + Date.now() + '.zip');
        toast('已下载 ' + ok + ' 张图片' + (fail ? '，' + fail + ' 张失败' : ''), 'success');
    }
    </script>
</body>
</html>
